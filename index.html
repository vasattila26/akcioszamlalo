<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Akciószámláló</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f2f2f7; margin: 0; padding: 20px; }
        
        /* Felső eredményjelző */
        #kijelzo { width: 90%; max-width: 400px; padding: 25px; background: #fff; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-align: center; margin-bottom: 25px; border: 2px solid #007AFF; }
        #eredmeny_szam { font-size: 32px; font-weight: bold; color: #ff3b30; margin: 0; }
        
        /* Beviteli mezők konténere */
        .input-group { width: 90%; max-width: 400px; background: white; padding: 20px; border-radius: 20px; display: flex; flex-direction: column; gap: 15px; }
        label { font-size: 14px; color: #8e8e93; margin-bottom: -10px; margin-left: 5px; }
        input { padding: 15px; border: 1px solid #d1d1d6; border-radius: 12px; font-size: 18px; outline: none; -webkit-appearance: none; }
        input:focus { border-color: #007AFF; }

        /* Gomb */
        #szamol_gomb { width: 90%; max-width: 400px; margin-top: 20px; background-color: #007AFF; color: white; border: none; padding: 18px; border-radius: 15px; font-size: 18px; font-weight: 600; cursor: pointer; }
        #szamol_gomb:active { background-color: #0056b3; transform: scale(0.98); }
    </style>
</head>
<body>

    <div id="kijelzo">
        <p style="margin:0; color:#8e8e93;">Akciós ár:</p>
        <p id="eredmeny_szam">0 Ft</p>
    </div>

    <div class="input-group">
        <label>Eredeti ár (Ft):</label>
        <input type="number" id="eredeti_ar" placeholder="Pl. 10000" inputmode="numeric">
        
        <label>Kedvezmény (%):</label>
        <input type="number" id="szazalek" placeholder="Pl. 20" inputmode="numeric">
    </div>
    
    <button id="szamol_gomb" py-click="szamold_ki">Kiszámolás</button>

    <script type="py" src="./main.py" config="./pyscript.json"></script>

</body>
</html>
