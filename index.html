<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Python App</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
</head>
<body>
    <h1>Python fut az iPhone-odon!</h1>
    <div id="output"></div>

    <script type="py">
        from datetime import datetime
        import js

        # Ez itt már tiszta Python!
        most = datetime.now().strftime("%H:%M:%S")
        js.document.getElementById("output").innerHTML = f"A pontos idő: {most}"
        
        print("Szia a konzolról!")
    </script>
</body>
</html>
